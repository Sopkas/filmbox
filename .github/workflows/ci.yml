name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/kinopulse_ci
      JWT_SECRET: ci_secret
      POISKKINO_API_KEY: ci_poiskkino_key
      CORS_ORIGIN: http://localhost:5173
      MOCK_POISKKINO: "true"

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: kinopulse_ci
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d kinopulse_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install root dependencies
        run: npm ci

      - name: Install backend dependencies
        run: npm ci --prefix backend

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Initialize database schema
        run: npm run db:init --prefix backend

      - name: Lint backend
        run: npm run lint --prefix backend

      - name: Lint frontend
        run: npm run lint --prefix frontend

      - name: Syntax checks backend
        run: npm run check:syntax --prefix backend

      - name: Build frontend
        run: npm run build --prefix frontend

      - name: Run integration API tests
        run: npm run test:integration --prefix backend

      - name: Check encoding guard
        run: npm run check:encoding
