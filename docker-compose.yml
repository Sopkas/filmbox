services:
  postgres:
    image: postgres:16
    container_name: kinopulse-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: kinopulse
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "55432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  pg_data:
